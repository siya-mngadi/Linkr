name: .NET Build Check

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # 🔥 IMPORTANT: specify your solution or project path
      - name: Restore dependencies
        run: dotnet restore Linkr.sln

      - name: Build backend
        run: dotnet build Linkr.sln --configuration Release --no-restore
